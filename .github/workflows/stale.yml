name: Stale

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned'
