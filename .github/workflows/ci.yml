name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type check
        run: pnpm typecheck

      - name: 🧪 Run tests
        run: pnpm test

      - name: 🏗️ Build
        run: pnpm build

      - name: ✅ Verify dist/ is up to date
        run: |
          if ! git diff --ignore-cr-at-eol --ignore-all-space --exit-code dist/; then
            echo "::warning::dist/ differs from committed version. This may be a cross-platform build difference."
            echo "If you made source changes, run 'pnpm build' locally and commit dist/"
          fi

  release:
    name: Release
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ✈️ Release Pilot
        id: release
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          create-release: true
          release-title: 'Release {{tag}}'
