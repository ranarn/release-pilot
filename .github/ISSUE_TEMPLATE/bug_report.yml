name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Workflow snippet
      description: Paste the relevant part of your workflow YAML.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Action logs
      description: Paste the relevant step output from the Actions run.
      render: text

  - type: input
    id: version
    attributes:
      label: Release Pilot version
      placeholder: e.g. v1.2.3 or @v1
    validations:
      required: true

  - type: dropdown
    id: runner
    attributes:
      label: Runner OS
      options:
        - ubuntu-latest
        - macos-latest
        - windows-latest
        - Other
    validations:
      required: true
